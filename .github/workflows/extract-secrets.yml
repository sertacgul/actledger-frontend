name: Extract Android Secrets

on:
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Extract keystore and passwords
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          PLAY_KEY: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          echo "KEYSTORE_PASSWORD=$KEYSTORE_PASSWORD"
          echo "KEY_PASSWORD=$KEY_PASSWORD"
          echo "$KEYSTORE_BASE64" | base64 --decode > keystore.jks
          keytool -list -keystore keystore.jks -storepass "$KEYSTORE_PASSWORD" -alias actledger -v 2>&1 | grep -E "SHA1|SHA256|Alias"
          echo "---PLAY_KEY_START---"
          echo "$PLAY_KEY"
          echo "---PLAY_KEY_END---"
