name: Extract Android Secrets

on:
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Extract keystore and passwords
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          PLAY_KEY: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > keystore.jks
          echo "$KEYSTORE_PASSWORD" > passwords.txt
          echo "$KEY_PASSWORD" >> passwords.txt
          echo "$PLAY_KEY" > play-key.json

      - name: Upload secrets as artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-secrets
          path: |
            keystore.jks
            passwords.txt
            play-key.json
          retention-days: 1
