    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <style>
      /*
        PWA standalone: shift entire app below iOS status bar.
        transform on #root makes fixed children position relative to #root,
        so fixed overlays (messages, modals) also shift down automatically.
      */
      @media (display-mode: standalone) {
        body::before {
          content: '';
          position: fixed;
          top: 0; left: 0; right: 0;
          height: 50px;
          background: #0f172a;
          z-index: 99999;
          pointer-events: none;
        }
      }
    </style>
